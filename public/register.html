<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi - Alecia Bot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        .register-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .register-header i {
            font-size: 50px;
            color: #667eea;
        }
        .btn-register {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            color: white;
            transition: all 0.3s;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .step-indicator {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }
        .step {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin: 0 10px;
            position: relative;
        }
        .step.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .step.completed {
            background: #4caf50;
            color: white;
        }
        .benefits {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .benefits h5 {
            color: #667eea;
            margin-bottom: 15px;
        }
        .alert {
            border-radius: 10px;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 768px) {
            .register-card { margin: 20px; padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="register-card">
            <div class="register-header">
                <i class="bi bi-robot"></i>
                <h2>Daftar Alecia Bot</h2>
                <p class="text-muted">Isi form berikut untuk mendaftar</p>
            </div>
            
            <div class="step-indicator">
                <div class="step active" id="step1">1</div>
                <div class="step" id="step2">2</div>
                <div class="step" id="step3">3</div>
            </div>
            
            <div id="alertMessage"></div>
            
            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label">Nomor WhatsApp *</label>
                    <input type="tel" class="form-control" id="number" placeholder="6281234567890" required>
                    <small class="text-muted">Masukkan nomor dengan kode negara (62), tanpa spasi</small>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Nama Lengkap *</label>
                    <input type="text" class="form-control" id="name" placeholder="Nama kamu" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Usia</label>
                    <input type="number" class="form-control" id="age" placeholder="Usia (opsional)">
                </div>
                
                <button type="submit" class="btn-register" id="submitBtn">
                    <i class="bi bi-check-circle"></i> Daftar Sekarang
                </button>
            </form>
            
            <div class="benefits">
                <h5><i class="bi bi-gift"></i> Bonus Pendaftaran:</h5>
                <ul>
                    <li><i class="bi bi-cash"></i> Rp 10,000 Money</li>
                    <li><i class="bi bi-star"></i> 500 EXP</li>
                    <li><i class="bi bi-ticket"></i> 50 Limit</li>
                </ul>
            </div>
            
            <div class="text-center mt-3">
                <small class="text-muted">
                    <i class="bi bi-shield-check"></i> Data kamu aman dan terenkripsi
                </small>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const alertDiv = document.getElementById('alertMessage');
        const submitBtn = document.getElementById('submitBtn');
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const step3 = document.getElementById('step3');
        
        function updateStep(step) {
            step1.className = 'step';
            step2.className = 'step';
            step3.className = 'step';
            if (step >= 1) step1.className = 'step completed';
            if (step >= 2) step2.className = 'step completed';
            if (step >= 3) step3.className = 'step completed';
            if (step === 1) step1.className = 'step active';
            if (step === 2) step2.className = 'step active';
            if (step === 3) step3.className = 'step active';
        }
        
        function showAlert(message, type) {
            alertDiv.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show">${message}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>`;
            setTimeout(() => {
                const alert = alertDiv.querySelector('.alert');
                if (alert) alert.classList.remove('show');
            }, 8000);
        }
        
        async function pollRegistrationStatus(number) {
            let attempts = 0;
            const maxAttempts = 30;
            const interval = setInterval(async () => {
                attempts++;
                try {
                    const response = await fetch(`/api/register?action=check&number=${number}`);
                    const data = await response.json();
                    if (data.registered) {
                        clearInterval(interval);
                        updateStep(3);
                        showAlert('✅ Bot telah mengirim konfirmasi ke WhatsApp Anda! Cek pesan masuk.', 'success');
                    } else if (attempts >= maxAttempts) {
                        clearInterval(interval);
                        showAlert('⏳ Pendaftaran sedang diproses. Bot akan mengirim pesan dalam beberapa menit.', 'warning');
                    }
                } catch(e) {}
            }, 2000);
        }
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            updateStep(1);
            
            const number = document.getElementById('number').value;
            const name = document.getElementById('name').value;
            const age = document.getElementById('age').value;
            
            if (!number || !name) {
                showAlert('Nomor dan nama wajib diisi!', 'danger');
                return;
            }
            
            let cleanNumber = number.replace(/[^0-9]/g, '');
            if (cleanNumber.startsWith('0')) cleanNumber = '62' + cleanNumber.substring(1);
            if (!cleanNumber.startsWith('62')) cleanNumber = '62' + cleanNumber;
            
            if (cleanNumber.length < 10) {
                showAlert('Nomor WhatsApp tidak valid!', 'danger');
                return;
            }
            
            updateStep(2);
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> Memproses...';
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ number: cleanNumber, name: name, age: age ? parseInt(age) : 0 })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    updateStep(2);
                    showAlert(`✅ ${result.message}`, 'success');
                    form.reset();
                    pollRegistrationStatus(cleanNumber);
                    setTimeout(() => { window.location.href = '/'; }, 5000);
                } else {
                    showAlert(`❌ ${result.error}`, 'danger');
                    updateStep(1);
                }
            } catch (error) {
                showAlert(`❌ Error: ${error.message}`, 'danger');
                updateStep(1);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="bi bi-check-circle"></i> Daftar Sekarang';
            }
        });
        
        const numberInput = document.getElementById('number');
        numberInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/[^0-9]/g, '');
            if (value.startsWith('0')) value = '62' + value.substring(1);
            e.target.value = value;
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
