<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi - Alecia Bot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        .register-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
        }
        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .register-header i {
            font-size: 50px;
            color: #667eea;
        }
        .register-header h2 {
            color: #333;
            margin-top: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            font-weight: 600;
            color: #555;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #ddd;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102,126,234,0.25);
        }
        .btn-register {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            font-size: 16px;
            width: 100%;
            color: white;
            transition: transform 0.3s;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            color: white;
        }
        .info-text {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }
        .alert {
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .benefits {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .benefits h5 {
            color: #667eea;
            margin-bottom: 15px;
        }
        .benefits ul {
            padding-left: 20px;
        }
        .benefits li {
            margin-bottom: 8px;
            color: #555;
        }
        @media (max-width: 768px) {
            .register-card {
                margin: 20px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="register-card">
            <div class="register-header">
                <i class="bi bi-robot"></i>
                <h2>Daftar Alecia Bot</h2>
                <p class="text-muted">Isi form berikut untuk mendaftar</p>
            </div>
            
            <div id="alertMessage"></div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label">
                        <i class="bi bi-whatsapp"></i> Nomor WhatsApp *
                    </label>
                    <input type="tel" class="form-control" id="number" 
                           placeholder="Contoh: 6281234567890" required>
                    <small class="text-muted">Masukkan nomor dengan kode negara (62)</small>
                </div>
                
                <div class="form-group">
                    <label class="form-label">
                        <i class="bi bi-person"></i> Nama Lengkap *
                    </label>
                    <input type="text" class="form-control" id="name" 
                           placeholder="Nama kamu" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">
                        <i class="bi bi-calendar"></i> Usia
                    </label>
                    <input type="number" class="form-control" id="age" 
                           placeholder="Usia (opsional)">
                </div>
                
                <div class="form-group">
                    <label class="form-label">
                        <i class="bi bi-person-plus"></i> Kode Referral (opsional)
                    </label>
                    <input type="text" class="form-control" id="referrer" 
                           placeholder="Kode referral dari teman">
                </div>
                
                <button type="submit" class="btn-register" id="submitBtn">
                    <i class="bi bi-check-circle"></i> Daftar Sekarang
                </button>
            </form>
            
            <div class="benefits">
                <h5><i class="bi bi-gift"></i> Bonus Pendaftaran:</h5>
                <ul>
                    <li><i class="bi bi-cash"></i> Rp 10,000 Money</li>
                    <li><i class="bi bi-star"></i> 500 EXP</li>
                    <li><i class="bi bi-ticket"></i> 50 Limit</li>
                    <li><i class="bi bi-gem"></i> Akses fitur dasar</li>
                </ul>
            </div>
            
            <div class="info-text">
                <i class="bi bi-shield-check"></i> Data kamu aman dan terenkripsi
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const alertDiv = document.getElementById('alertMessage');
        const submitBtn = document.getElementById('submitBtn');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Disable button
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> Memproses...';
            
            // Get values
            const number = document.getElementById('number').value;
            const name = document.getElementById('name').value;
            const age = document.getElementById('age').value;
            const referrer = document.getElementById('referrer').value;
            
            // Validate
            if (!number) {
                showAlert('Nomor WhatsApp wajib diisi!', 'danger');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="bi bi-check-circle"></i> Daftar Sekarang';
                return;
            }
            
            if (!name) {
                showAlert('Nama wajib diisi!', 'danger');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="bi bi-check-circle"></i> Daftar Sekarang';
                return;
            }
            
            // Clean number
            let cleanNumber = number.replace(/[^0-9]/g, '');
            if (cleanNumber.startsWith('0')) {
                cleanNumber = '62' + cleanNumber.substring(1);
            }
            if (!cleanNumber.startsWith('62')) {
                cleanNumber = '62' + cleanNumber;
            }
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        number: cleanNumber,
                        name: name,
                        age: age ? parseInt(age) : 0,
                        referrer: referrer || null
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showAlert(`
                        <i class="bi bi-check-circle-fill"></i> 
                        <strong>Registrasi Berhasil!</strong><br>
                        Selamat datang ${result.user.name}!<br>
                        Bonus sudah ditambahkan ke akun kamu.
                    `, 'success');
                    form.reset();
                    
                    // Redirect setelah 3 detik
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 3000);
                } else {
                    showAlert(`
                        <i class="bi bi-exclamation-triangle-fill"></i> 
                        <strong>Registrasi Gagal!</strong><br>
                        ${result.error}
                    `, 'danger');
                }
            } catch (error) {
                showAlert(`
                    <i class="bi bi-exclamation-triangle-fill"></i> 
                    <strong>Error!</strong><br>
                    ${error.message}
                `, 'danger');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="bi bi-check-circle"></i> Daftar Sekarang';
            }
        });
        
        function showAlert(message, type) {
            alertDiv.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            
            // Auto dismiss after 5 seconds
            setTimeout(() => {
                const alert = alertDiv.querySelector('.alert');
                if (alert) {
                    alert.classList.remove('show');
                    setTimeout(() => {
                        alertDiv.innerHTML = '';
                    }, 150);
                }
            }, 5000);
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
