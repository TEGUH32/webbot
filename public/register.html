<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi - Alecia Bot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        .register-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
        }
        .btn-register {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            color: white;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="register-card">
            <div class="text-center mb-4">
                <i class="bi bi-robot fs-1" style="color: #667eea;"></i>
                <h2 class="mt-2">Daftar Alecia Bot</h2>
                <p class="text-muted">Isi form berikut untuk mendaftar</p>
            </div>
            
            <div id="alertMessage"></div>
            
            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label">Nomor WhatsApp *</label>
                    <input type="tel" class="form-control" id="number" placeholder="6281234567890" required>
                    <small class="text-muted">Masukkan nomor dengan kode negara (62)</small>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Nama Lengkap *</label>
                    <input type="text" class="form-control" id="name" placeholder="Nama kamu" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Usia</label>
                    <input type="number" class="form-control" id="age" placeholder="Usia (opsional)">
                </div>
                
                <button type="submit" class="btn-register" id="submitBtn">
                    <i class="bi bi-check-circle"></i> Daftar Sekarang
                </button>
            </form>
            
            <div class="mt-4 text-center">
                <small class="text-muted">
                    <i class="bi bi-shield-check"></i> Data kamu aman dan terenkripsi
                </small>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const alertDiv = document.getElementById('alertMessage');
        const submitBtn = document.getElementById('submitBtn');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> Memproses...';
            
            const number = document.getElementById('number').value;
            const name = document.getElementById('name').value;
            const age = document.getElementById('age').value;
            
            let cleanNumber = number.replace(/[^0-9]/g, '');
            if (cleanNumber.startsWith('0')) cleanNumber = '62' + cleanNumber.substring(1);
            if (!cleanNumber.startsWith('62')) cleanNumber = '62' + cleanNumber;
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        number: cleanNumber,
                        name: name,
                        age: age ? parseInt(age) : 0
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alertDiv.innerHTML = `<div class="alert alert-success">✅ Registrasi Berhasil! Selamat datang ${result.user.name}!</div>`;
                    form.reset();
                    setTimeout(() => { window.location.href = '/'; }, 2000);
                } else {
                    alertDiv.innerHTML = `<div class="alert alert-danger">❌ ${result.error}</div>`;
                }
            } catch (error) {
                alertDiv.innerHTML = `<div class="alert alert-danger">❌ Error: ${error.message}</div>`;
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="bi bi-check-circle"></i> Daftar Sekarang';
            }
        });
    </script>
</body>
</html>
