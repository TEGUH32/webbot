<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Chat - Alecia Bot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 0;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            color: #FFD700;
        }

        .navbar-brand i {
            margin-right: 10px;
        }

        /* Chat Container */
        .chat-container {
            max-width: 900px;
            margin: 20px auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 20px;
            color: white;
        }

        .chat-header h4 {
            margin: 0;
            font-weight: 600;
        }

        .chat-header p {
            margin: 5px 0 0;
            opacity: 0.9;
            font-size: 0.85rem;
        }

        /* Messages Area */
        .messages-area {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        /* Message Bubble */
        .message {
            margin-bottom: 20px;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .message-content {
            flex: 1;
            margin-left: 15px;
        }

        .message-name {
            font-weight: 600;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .verified-badge {
            background: #1da1f2;
            color: white;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .owner-badge {
            background: #FFD700;
            color: #000;
        }

        .message-text {
            background: white;
            padding: 12px 15px;
            border-radius: 15px;
            border-top-left-radius: 5px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            word-wrap: break-word;
        }

        .message-time {
            font-size: 0.7rem;
            color: #999;
            margin-top: 5px;
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #eee;
        }

        .input-group-custom {
            display: flex;
            gap: 10px;
        }

        .input-group-custom input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 12px 15px;
            font-size: 0.9rem;
        }

        .input-group-custom input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-send {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            padding: 0 25px;
            color: white;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 20px;
            color: #999;
        }

        /* Empty state */
        .empty-chat {
            text-align: center;
            padding: 50px;
            color: #999;
        }

        /* Like button */
        .like-btn {
            background: none;
            border: none;
            color: #999;
            font-size: 0.8rem;
            margin-top: 5px;
            transition: all 0.3s;
        }

        .like-btn:hover {
            color: #e74c3c;
            transform: scale(1.1);
        }

        .like-btn.liked {
            color: #e74c3c;
        }

        /* Delete button */
        .delete-btn {
            background: none;
            border: none;
            color: #999;
            font-size: 0.8rem;
            margin-left: 10px;
        }

        .delete-btn:hover {
            color: #e74c3c;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .chat-container {
                margin: 10px;
            }
            .messages-area {
                height: 400px;
            }
            .message-avatar {
                width: 35px;
                height: 35px;
                font-size: 0.9rem;
            }
            .message-text {
                font-size: 0.85rem;
            }
        }

        /* Scrollbar */
        .messages-area::-webkit-scrollbar {
            width: 5px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <div>
                <i class="bi bi-chat-dots-fill fs-3 me-2" style="color: #FFD700;"></i>
                <span class="navbar-brand">PUBLIC CHAT</span>
                <span class="badge bg-warning text-dark ms-2" id="onlineCount">● Live</span>
            </div>
            <div>
                <a href="/" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-house"></i> Dashboard
                </a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="chat-container">
            <div class="chat-header">
                <h4><i class="bi bi-chat-dots-fill"></i> Ruang Obrolan Publik</h4>
                <p>Bercakap-cakap dengan pengguna lain dengan sopan ya!</p>
            </div>

            <div class="messages-area" id="messagesArea">
                <div class="loading">
                    <div class="spinner-border text-primary"></div>
                    <p class="mt-2">Memuat pesan...</p>
                </div>
            </div>

            <div class="input-area">
                <div class="input-group-custom">
                    <input type="text" id="nameInput" class="form-control" placeholder="Nama Anda" maxlength="30">
                    <input type="text" id="messageInput" class="form-control" placeholder="Tulis pesan..." maxlength="500">
                    <button class="btn-send" onclick="sendMessage()">
                        <i class="bi bi-send"></i> Kirim
                    </button>
                </div>
                <small class="text-muted d-block mt-2">
                    <i class="bi bi-info-circle"></i> 
                    Pengguna dengan centang biru adalah pengguna terverifikasi. 
                    <span class="text-warning">👑 Teguh</span> adalah Owner dengan centang biru!
                </small>
            </div>
        </div>
    </div>

    <script>
        let comments = [];
        let verifiedUsers = [];
        let currentName = localStorage.getItem('chatName') || '';
        
        // Load name from localStorage
        if (currentName) {
            document.getElementById('nameInput').value = currentName;
        }
        
        // Load messages
        async function loadMessages() {
            try {
                const response = await fetch('/api/comments?limit=100');
                const data = await response.json();
                
                if (data.success) {
                    comments = data.comments;
                    verifiedUsers = data.verifiedUsers || [];
                    renderMessages();
                }
            } catch (error) {
                console.error('Error loading messages:', error);
            }
        }
        
        // Render messages
        function renderMessages() {
            const area = document.getElementById('messagesArea');
            
            if (!comments || comments.length === 0) {
                area.innerHTML = `
                    <div class="empty-chat">
                        <i class="bi bi-chat-dots fs-1"></i>
                        <p class="mt-2">Belum ada pesan. Jadilah yang pertama!</p>
                    </div>
                `;
                return;
            }
            
            area.innerHTML = comments.map(comment => {
                const isVerified = comment.isVerified;
                const verifiedInfo = verifiedUsers.find(v => v.name === comment.name);
                const badgeText = comment.verifiedBadge || (verifiedInfo ? verifiedInfo.badge : '');
                const isOwner = comment.name === 'Teguh';
                
                return `
                    <div class="message d-flex" data-id="${comment.id}">
                        <div class="message-avatar" style="background: ${getAvatarColor(comment.name)}">
                            ${comment.name.charAt(0).toUpperCase()}
                        </div>
                        <div class="message-content">
                            <div class="message-name">
                                <span>${escapeHtml(comment.name)}</span>
                                ${isVerified ? `<span class="verified-badge ${isOwner ? 'owner-badge' : ''}">
                                    <i class="bi bi-patch-check-fill"></i> ${badgeText || 'Verified'}
                                </span>` : ''}
                                ${isOwner ? '<span class="verified-badge owner-badge"><i class="bi bi-crown-fill"></i> Owner</span>' : ''}
                            </div>
                            <div class="message-text">
                                ${escapeHtml(comment.message)}
                            </div>
                            <div class="d-flex align-items-center gap-2">
                                <small class="message-time">
                                    <i class="bi bi-clock"></i> ${formatTime(comment.timestamp)}
                                </small>
                                <button class="like-btn" onclick="likeMessage('${comment.id}')">
                                    <i class="bi bi-heart"></i> <span id="likes-${comment.id}">${comment.likes || 0}</span>
                                </button>
                                ${canDelete(comment.name) ? `
                                    <button class="delete-btn" onclick="deleteMessage('${comment.id}')">
                                        <i class="bi bi-trash"></i> Hapus
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            // Scroll to bottom
            area.scrollTop = area.scrollHeight;
        }
        
        // Send message
        async function sendMessage() {
            const nameInput = document.getElementById('nameInput');
            const messageInput = document.getElementById('messageInput');
            
            const name = nameInput.value.trim();
            const message = messageInput.value.trim();
            
            if (!name) {
                alert('Masukkan nama Anda!');
                nameInput.focus();
                return;
            }
            
            if (!message) {
                alert('Masukkan pesan!');
                messageInput.focus();
                return;
            }
            
            if (message.length > 500) {
                alert('Pesan terlalu panjang! Maksimal 500 karakter.');
                return;
            }
            
            // Save name to localStorage
            localStorage.setItem('chatName', name);
            
            try {
                const response = await fetch('/api/comments', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, message })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    messageInput.value = '';
                    loadMessages();
                } else {
                    alert('Error: ' + result.error);
                }
            } catch (error) {
                alert('Gagal mengirim pesan: ' + error.message);
            }
        }
        
        // Like message
        async function likeMessage(id) {
            try {
                const response = await fetch(`/api/comments/like?id=${id}`, {
                    method: 'POST'
                });
                const result = await response.json();
                if (result.success) {
                    const likesSpan = document.getElementById(`likes-${id}`);
                    if (likesSpan) likesSpan.innerText = result.likes;
                }
            } catch (error) {
                console.error('Error liking:', error);
            }
        }
        
        // Delete message
        async function deleteMessage(id) {
            if (!confirm('Hapus pesan ini?')) return;
            
            const name = document.getElementById('nameInput').value.trim();
            
            try {
                const response = await fetch(`/api/comments?id=${id}&name=${encodeURIComponent(name)}`, {
                    method: 'DELETE'
                });
                const result = await response.json();
                if (result.success) {
                    loadMessages();
                } else {
                    alert('Error: ' + result.error);
                }
            } catch (error) {
                alert('Gagal menghapus: ' + error.message);
            }
        }
        
        // Check if user can delete
        function canDelete(name) {
            return name === 'Teguh' || name === 'Admin';
        }
        
        // Helper functions
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return 'Baru saja';
            if (diff < 3600000) return `${Math.floor(diff / 60000)} menit lalu`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)} jam lalu`;
            return date.toLocaleDateString('id-ID');
        }
        
        function getAvatarColor(name) {
            const colors = ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#43e97b', '#fa709a'];
            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = ((hash << 5) - hash) + name.charCodeAt(i);
                hash |= 0;
            }
            return colors[Math.abs(hash) % colors.length];
        }
        
        // Enter key to send
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        // Auto refresh every 5 seconds
        setInterval(loadMessages, 5000);
        
        // Initial load
        loadMessages();
    </script>
</body>
  </html>
